# Load partition and filesystem modules explicitly so GRUB can search all disks
insmod part_gpt
insmod part_msdos
insmod iso9660
insmod search_label

# Find the IronKey volume by label regardless of which disk/port the USB is on.
# grub-mkrescue sets -volid IRONKEY; this replaces the fragile hardcoded (hd0,1).
search --no-floppy --label --set=root IRONKEY

set default=0
set timeout=5
set timeout_style=menu

terminal_output console

menuentry "IronKey" {
    linux /boot/vmlinuz boot=live components quiet splash=0 console=tty1 loglevel=3 rd.systemd.show_status=false
    initrd /boot/initramfs.img
}

menuentry "IronKey (verbose / debug)" {
    linux /boot/vmlinuz boot=live components console=tty1 loglevel=7
    initrd /boot/initramfs.img
}

menuentry "IronKey (UEFI / nomodeset)" {
    linux /boot/vmlinuz boot=live components quiet nomodeset console=tty1 loglevel=3
    initrd /boot/initramfs.img
}

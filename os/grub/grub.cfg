# ── Video drivers ──────────────────────────────────────────────────────────────
# insmod all_video loads every bundled driver (vbe, vga, efi_gop, efi_uga, etc.)
# so GRUB's video probe succeeds and does not emit "No suitable video mode found".
insmod all_video
load_video

# ── Partition / filesystem modules ────────────────────────────────────────────
insmod part_gpt
insmod part_msdos
insmod iso9660
insmod search_label

# ── Volume search (must happen before loadfont so $root is valid) ─────────────
# Find the IronKey volume by label regardless of which disk/port the USB is on.
search --no-floppy --label --set=root IRONKEY

# ── Font + terminal ────────────────────────────────────────────────────────────
# grub-mkrescue bundles unicode.pf2 automatically. Load it for gfxterm rendering.
if loadfont ($root)/boot/grub/fonts/unicode.pf2; then
    set gfxmode=auto
    insmod gfxterm
    terminal_output gfxterm
else
    # Font not found — fall back to VGA text terminal (always works)
    terminal_output console
fi

set default=0
set timeout=5
set timeout_style=countdown

# ── gfxpayload=text: force VGA text mode before handing off to the kernel ─────
# Without this, the kernel resets whatever graphical framebuffer GRUB set up
# and the screen goes blank. Text mode is visible on all hardware; the kernel
# re-enables DRM/framebuffer later via its own drivers.
set gfxpayload=text

menuentry "IronKey" {
    linux /boot/vmlinuz boot=live components console=tty0 console=tty1 loglevel=3 earlyprintk=vga video=efifb:on rd.systemd.show_status=false
    initrd /boot/initramfs.img
}

menuentry "IronKey (verbose / debug)" {
    linux /boot/vmlinuz boot=live components console=tty0 console=tty1 loglevel=7 earlyprintk=vga
    initrd /boot/initramfs.img
}

menuentry "IronKey (safe video — nomodeset)" {
    set gfxpayload=text
    linux /boot/vmlinuz boot=live components nomodeset console=tty0 console=tty1 loglevel=3
    initrd /boot/initramfs.img
}

# IronKey Pre-installed Tools Manifest
# This file defines every tool bundled on the USB image.
#
# Format per entry:
#   [[tools]]
#   name = "binary name"
#   package = "source package / crate"
#   category = "category"
#   purpose = "short description"
#   rust_native = true/false  # true = Rust-native tool
#   static_link = true/false  # true = statically linked
#   version = "pinned version"

# ──────────────────────────────────────────────────────────────────────────────
# Shells
# ──────────────────────────────────────────────────────────────────────────────

[[tools]]
name = "zsh"
package = "zsh"
category = "shell"
purpose = "Default interactive shell"
rust_native = false
static_link = false

[[tools]]
name = "bash"
package = "bash"
category = "shell"
purpose = "POSIX fallback shell"
rust_native = false
static_link = false


# IronKey live-boot configuration
# https://manpages.debian.org/bookworm/live-boot-doc/live-boot.7.en.html

# Do not search for or activate any swap partitions
LIVE_SWAP=false

# Use overlayfs for the writable layer (kernel 4.0+; available in all modern kernels)
LIVE_OVERLAY=overlayfs

# Path inside the ISO where the squashfs resides (default; explicit for clarity)
LIVE_MEDIA_PATH=live

# The squashfs filename (default)
LIVE_FILESYSTEM=filesystem.squashfs

# Do not try to persist writes to the USB (IronKey is intentionally stateless)
LIVE_PERSISTENCE=false

# Allow the system to boot even if the hostname cannot be resolved
LIVE_HOSTNAME=ironkey
